<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axiom | Data Uploader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
<div class="ambient"></div>
<div class="wrapper">

  <header>
    <div class="logo-group">
      <div class="logo">
        
        <a href="{{ url_for('index') }}" class="logo-link">
          <div class="logo"><span>Axiom</span> Retention</div>
        </a>

        <div class="logo-sub">Behavioural Intelligence Platform</div>
      </div>
    </div>


<nav class="nav">
    <div class="header-meta">Welcome back, {{ username }}!</div>
    
    <div class="nav-links-group">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('index') }}">How it Works</a>
        <a href="{{ url_for('logout') }}">Sign out</a>
        <a href="{{ url_for('upload_data') }}" class="btn-login">Upload Data</a>
    </div>
</nav>
  </header>

 
    <div class="section-label">Upload Data</div>
<div class="upload-page-wrapper">
    <div class="upload-card">
        <div class="upload-header">
            <h2>Data Portal</h2>
            <p>Upload your membership attendance data (CSV)</p>
        </div>

        <form method="POST" enctype="multipart/form-data" class="upload-form">
            <div class="form-group">
                <label for="client_id">Account</label>
                <div class="select-wrapper">
                    <select name="client_id" id="client_id" required>
                        <option value="" disabled selected>...</option>
                        {% for cid in client_ids %}
                            <option value="{{ cid }}">{{ cid }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="file">Data (CSV)</label>
                <input type="file" name="file" id="file" accept=".csv" required class="file-input">
            </div>

            <button type="submit" class="btn-upload-gold">
                <span>Upload</span>
                <i class="upload-icon">↑</i>
            </button>
        </form>
    </div>
</div>




  <footer>
    <div class="footer-brand"><span>Axiom</span> Retention Group</div>
  </footer>

</div>
</body>
</html>
